name: Run KS Bot

on:
  workflow_dispatch:

permissions:
  actions: write     # still needed even if deletion often fails with GITHUB_TOKEN
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hours max — prevents runaway bills

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # ────────────────────────────────────────────────
      #               Start the actual bot / tunnel
      # ────────────────────────────────────────────────
      - name: Start sshx (or your bot)
        run: |
          echo "Starting sshx..."
          curl -sSf https://sshx.io/get | sh -s run > sshx.log 2>&1 &
          sleep 6

          # Try to show the URL clearly — sshx usually prints it early
          echo "----------------------------------------"
          echo "sshx output (last 20 lines):"
          tail -n 20 sshx.log || cat sshx.log
          echo "----------------------------------------"

          echo ""
          echo "Most important — look for line like:"
          echo "https://sshx.io/..............."
          echo "Copy that URL manually from the log above!"
          echo ""

          # Keep showing log every 30s so it's visible in live log
          (while true; do tail -n 8 sshx.log; sleep 30; done) &
      # ────────────────────────────────────────────────

      # Keep the job alive \~5.8 hours (then it will naturally finish)
      - name: Keep workflow alive (\~5.8 hours)
        run: sleep 21000

      # ────────────────────────────────────────────────
      #      Cleanup — only runs if job finishes or is cancelled
      # ────────────────────────────────────────────────
      - name: Delete old completed workflow runs (best effort)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
          SELF_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          echo "=== Starting Workflow Run Cleanup ==="
          echo "Current run ID: $SELF_RUN_ID"
          echo "Repository    : $REPO"

          if [ -z "$GH_TOKEN" ]; then
            echo "ERROR: GH_PAT secret is missing → skipping deletion"
            echo "→ Create a CLASSIC PAT (not fine-grained) with 'repo' scope"
            echo "→ Store it in repo Settings → Secrets → Actions → GH_PAT"
            exit 0
          fi

          echo "Token present (length: ${#GH_TOKEN} chars)"

          page=1
          max_pages=6

          while [ $page -le $max_pages ]; do
            echo "─ Fetching page $page..."

            # Use file + HTTP status capture (most reliable way)
            curl -sS -w "%{http_code}" -o /tmp/runs.json \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/actions/runs?per_page=100&page=$page" > /tmp/http.txt

            HTTP_CODE=$(cat /tmp/http.txt)

            if [ "$HTTP_CODE" != "200" ]; then
              echo "GitHub API error → HTTP $HTTP_CODE"
              if [ -s /tmp/runs.json ]; then
                echo "Response preview:"
                head -c 500 /tmp/runs.json
              fi
              break
            fi

            count=$(jq '.workflow_runs | length' /tmp/runs.json 2>/dev/null || echo 0)
            echo "Found $count runs on page $page"

            if [ "$count" -eq 0 ]; then
              break
            fi

            # Super safe parsing (no tab/IFS issues)
            jq -c '.workflow_runs[]' /tmp/runs.json | while read -r run; do
              id=$(echo "$run" | jq -r '.id // empty')
              status=$(echo "$run" | jq -r '.status // empty')
              name=$(echo "$run" | jq -r '.name // "unknown"')

              [ -z "$id" ] && continue

              if [ "$id" = "$SELF_RUN_ID" ]; then
                echo "  ⏭️ Skipping self run $id"
                continue
              fi

              if [[ "$status" == "in_progress" || "$status" == "queued" ]]; then
                echo "  ⏭️ Skipping active run $id ($status)"
                continue
              fi

              echo "  🗑️ Deleting run $id ($name)..."

              del_http=$(curl -sS -o /dev/null -w "%{http_code}" -X DELETE \
                -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/$REPO/actions/runs/$id")

              if [[ "\( del_http" =\~ ^(204|202|200) \) ]]; then
                echo "    ✅ Successfully deleted $id"
              else
                echo "    ❌ Failed (HTTP $del_http)"
              fi

              sleep 1
            done

            page=$((page + 1))
            sleep 1
          done

          rm -f /tmp/runs.json /tmp/http.txt 2>/dev/null || true
          echo "=== Cleanup finished ==="

      # Optional: only re-dispatch manually — avoid auto-loop for now
      # If you really want auto-restart → add delay + limit logic
      # - name: Restart workflow (manual trigger recommended)
      #   if: false   # ← change to true only if you accept the risk
      #   uses: benc-uk/workflow-dispatch@v1
      #   with:
      #     workflow: Run KS Bot
      #     ref: main
      #     token: ${{ secrets.GH_PAT }}   # PAT again
