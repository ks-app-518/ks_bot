name: Run KS Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Start sshx and capture log
      - name: Start sshx
        run: |
          curl -sSf https://sshx.io/get | sh -s run > sshx.log 2>&1 &
          sleep 6
          cat sshx.log
          sleep 50000
