name: Run KS Bot

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Install jq
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # Start sshx
      - name: Start sshx
        run: |
          curl -sSf https://sshx.io/get | sh -s run > sshx.log 2>&1 &
          sleep 5
          cat sshx.log

      # Keep workflow alive
      - name: Keep Alive
        run: sleep 21000

      # Delete old workflow runs
      - name: Delete old workflow runs
        if: always()
        env:
          REPO: ${{ github.repository }}
          SELF_RUN_ID: ${{ github.run_id }}
          TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "Current run ID: $SELF_RUN_ID"

          PAGE=1
          PER_PAGE=100

          while true; do
            echo "Fetching page $PAGE"

            RESPONSE=$(curl -s \
              -H "Authorization: token $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/actions/runs?per_page=$PER_PAGE&page=$PAGE")

            COUNT=$(echo "$RESPONSE" | jq '.workflow_runs | length')

            if [ "$COUNT" -eq 0 ]; then
              echo "No more runs"
              break
            fi

            echo "$RESPONSE" | jq -c '.workflow_runs[]' | while read RUN; do

              ID=$(echo "$RUN" | jq -r '.id')
              STATUS=$(echo "$RUN" | jq -r '.status')

              if [ "$ID" = "$SELF_RUN_ID" ]; then
                echo "Skipping current run"
                continue
              fi

              if [ "$STATUS" = "in_progress" ] || [ "$STATUS" = "queued" ]; then
                echo "Skipping active run $ID"
                continue
              fi

              echo "Deleting run $ID"

              curl -s -X DELETE \
                -H "Authorization: token $TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$REPO/actions/runs/$ID"

              sleep 1

            done

            PAGE=$((PAGE+1))
          done

          echo "Cleanup finished"

      # Restart workflow
      - name: Restart Workflow
        if: always()
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: Run KS Bot
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
